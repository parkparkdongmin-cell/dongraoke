<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Tesla Lyrics Sync — YouTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #15181d;
    --surface-2: #1b1f26;
    --text-primary: #f5f6f7;
    --text-muted: #6b7480;
    --text-dim: #3a4048;
    --accent: #ff3b3b;
    --accent-glow: rgba(255, 59, 59, 0.35);
    --border: #21262d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  #app { height: 100vh; display: flex; flex-direction: column; }

  /* ---------- 상단: 검색 / 트랙 정보 ---------- */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #searchForm { display: flex; gap: 8px; flex: 1; min-width: 0; }
  #searchInput {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 100px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchBtn {
    background: var(--accent);
    color: #1a0505;
    border: none;
    border-radius: 100px;
    padding: 0 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #status {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 100px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  #status.live { color: var(--accent); border-color: var(--accent); }

  /* ---------- 검색 결과 드롭다운 ---------- */
  #resultsPanel {
    position: absolute;
    top: 62px; left: 20px; right: 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    z-index: 20;
  }
  .resultItem {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .resultItem:last-child { border-bottom: none; }
  .resultItem:hover { background: #22272f; }
  .resultItem img { width: 48px; height: 36px; border-radius: 4px; object-fit: cover; }
  .resultTitle { font-size: 13px; font-weight: 500; }
  .resultChannel { font-size: 11px; color: var(--text-muted); }

  /* ---------- 가사 스테이지 ---------- */
  #lyricsStage {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #lyricsTrack {
    position: absolute;
    width: 100%;
    padding: 0 40px;
    text-align: center;
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .line {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.9;
    color: var(--text-dim);
    transition: color 0.4s ease, font-size 0.4s ease, text-shadow 0.4s ease;
  }
  .line.current {
    color: var(--text-primary);
    font-size: 34px;
    font-weight: 700;
    text-shadow: 0 0 24px var(--accent-glow);
  }
  .line.near { color: var(--text-muted); font-size: 24px; }

  #progressBar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: var(--accent);
    width: 0%;
    box-shadow: 0 0 10px var(--accent-glow);
    transition: width 0.1s linear;
  }

  #emptyState {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text-muted);
    font-size: 15px;
    text-align: center;
    line-height: 1.8;
    padding: 0 30px;
  }

  /* YouTube 플레이어는 화면엔 안 보이게, 오디오/시간정보만 사용 */
  #ytPlayerWrap {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
  }

  #apiKeyBar {
    display: none;
    padding: 10px 20px;
    background: #1a1400;
    border-bottom: 1px solid #3a2e00;
    font-size: 12px;
    color: #e0c96a;
    gap: 8px;
    align-items: center;
  }
  #apiKeyBar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
  }
  #apiKeyBar button {
    background: var(--accent);
    border: none;
    color: #1a0505;
    font-weight: 700;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
  }

  /* 미니 재생 컨트롤 */
  #controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #controls button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 44px; height: 44px;
    border-radius: 100px;
    font-size: 16px;
    cursor: pointer;
  }
  #controls button:active { background: var(--surface); }
</style>
</head>
<body>

<div id="app">
  <div id="apiKeyBar">
    <span>YouTube Data API 키가 필요해요 →</span>
    <input id="apiKeyInput" placeholder="API 키 붙여넣기" />
    <button id="apiKeySaveBtn">저장</button>
  </div>

  <div id="topbar">
    <form id="searchForm">
      <input id="searchInput" placeholder="곡 제목 또는 아티스트 검색" autocomplete="off" />
      <button id="searchBtn" type="submit">검색</button>
    </form>
    <div id="status">OFFLINE</div>
  </div>

  <div id="resultsPanel"></div>

  <div id="lyricsStage">
    <div id="emptyState">곡을 검색해서 선택하면<br/>여기에 가사가 싱크되어 표시됩니다.</div>
    <div id="lyricsTrack" style="display:none;"></div>
    <div id="progressBar"></div>
    <div id="ytPlayerWrap"><div id="ytPlayer"></div></div>
  </div>

  <div id="controls">
    <button id="prevBtn" title="이전 줄">◀</button>
    <button id="playPauseBtn" title="재생/일시정지">▶</button>
    <button id="nextBtn" title="다음 줄">▶▶</button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* =========================================================
   0. YouTube Data API 키 관리 (검색 전용, 재생엔 불필요)
   ========================================================= */
function getApiKey() { return localStorage.getItem('yt_api_key') || ''; }

function initApiKeyUI() {
  const bar = document.getElementById('apiKeyBar');
  const input = document.getElementById('apiKeyInput');
  if (!getApiKey()) {
    bar.style.display = 'flex';
    input.value = '';
  }
  document.getElementById('apiKeySaveBtn').addEventListener('click', () => {
    const v = input.value.trim();
    if (v) {
      localStorage.setItem('yt_api_key', v);
      bar.style.display = 'none';
    }
  });
}
initApiKeyUI();

/* =========================================================
   1. YouTube 검색 (Data API v3 search endpoint)
   ========================================================= */
async function searchYouTube(query) {
  const key = getApiKey();
  if (!key) {
    alert('상단에 YouTube Data API 키를 먼저 입력해주세요.');
    return [];
  }
  const params = new URLSearchParams({
    part: 'snippet',
    q: query,
    type: 'video',
    videoCategoryId: '10', // Music
    maxResults: '8',
    key
  });
  const res = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
  if (!res.ok) {
    console.error(await res.text());
    alert('검색 실패. API 키 또는 할당량을 확인해주세요.');
    return [];
  }
  const data = await res.json();
  return data.items.map(item => ({
    videoId: item.id.videoId,
    title: item.snippet.title,
    channel: item.snippet.channelTitle,
    thumb: item.snippet.thumbnails?.default?.url
  }));
}

document.getElementById('searchForm').addEventListener('submit', async e => {
  e.preventDefault();
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const results = await searchYouTube(q);
  renderResults(results);
});

function renderResults(results) {
  const panel = document.getElementById('resultsPanel');
  if (results.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.innerHTML = results.map(r => `
    <div class="resultItem" data-id="${r.videoId}" data-title="${escapeHtml(r.title)}" data-channel="${escapeHtml(r.channel)}">
      <img src="${r.thumb || ''}" />
      <div>
        <div class="resultTitle">${escapeHtml(r.title)}</div>
        <div class="resultChannel">${escapeHtml(r.channel)}</div>
      </div>
    </div>
  `).join('');
  panel.style.display = 'block';

  panel.querySelectorAll('.resultItem').forEach(el => {
    el.addEventListener('click', () => {
      playVideo(el.dataset.id, el.dataset.title, el.dataset.channel);
      panel.style.display = 'none';
    });
  });
}

/* =========================================================
   2. YouTube IFrame Player
   ========================================================= */
let ytPlayer;
let ytReady = false;

window.onYouTubeIframeAPIReady = () => {
  ytPlayer = new YT.Player('ytPlayer', {
    height: '1', width: '1',
    playerVars: { autoplay: 1, controls: 0 },
    events: {
      onReady: () => { ytReady = true; setStatus(true); },
      onStateChange: onPlayerStateChange
    }
  });
};

function onPlayerStateChange(e) {
  const btn = document.getElementById('playPauseBtn');
  btn.textContent = e.data === YT.PlayerState.PLAYING ? '❚❚' : '▶';
}

function playVideo(videoId, title, channel) {
  if (!ytReady) { alert('플레이어 초기화 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  ytPlayer.loadVideoById(videoId);
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('searchInput').value = '';
  loadLyricsFor(title, channel);
}

document.getElementById('playPauseBtn').addEventListener('click', () => {
  if (!ytPlayer) return;
  const state = ytPlayer.getPlayerState();
  if (state === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
  else ytPlayer.playVideo();
});

/* 이전/다음 줄로 재생 위치 점프 (가사 기준 탐색용, 선택 기능) */
document.getElementById('prevBtn').addEventListener('click', () => jumpLine(-1));
document.getElementById('nextBtn').addEventListener('click', () => jumpLine(1));
function jumpLine(dir) {
  if (!currentLyrics.length || !ytPlayer) return;
  const targetIdx = Math.max(0, Math.min(currentLyrics.length - 1, lastActiveIndex + dir));
  ytPlayer.seekTo(currentLyrics[targetIdx].time, true);
}

function setStatus(live) {
  const el = document.getElementById('status');
  el.textContent = live ? 'READY' : 'OFFLINE';
  el.classList.toggle('live', live);
}

/* =========================================================
   3. 가사 검색/파싱 — YouTube 영상 제목에서 아티스트/곡명 추정
   ========================================================= */
let currentLyrics = [];
let lastActiveIndex = -1;

// "아티스트 - 곡명 (Official MV)" 같은 흔한 유튜브 제목 패턴을 정리
function guessTrackAndArtist(rawTitle, channelName) {
  let t = rawTitle
    .replace(/\(.*?official.*?\)/gi, '')
    .replace(/\[.*?official.*?\]/gi, '')
    .replace(/\(.*?m\/?v.*?\)/gi, '')
    .replace(/\(.*?lyrics.*?\)/gi, '')
    .replace(/\(.*?audio.*?\)/gi, '')
    .trim();

  let artist = channelName.replace(/ - Topic$/i, '').trim();
  let track = t;

  const dashSplit = t.split(/\s-\s/);
  if (dashSplit.length >= 2) {
    artist = dashSplit[0].trim();
    track = dashSplit.slice(1).join(' - ').trim();
  }
  return { artist, track };
}

async function loadLyricsFor(rawTitle, channelName) {
  const { artist, track } = guessTrackAndArtist(rawTitle, channelName);

  const stage = document.getElementById('lyricsTrack');
  stage.style.display = 'block';
  stage.innerHTML = `<div class="line current">"${escapeHtml(track)}" 가사 검색 중…</div>`;
  currentLyrics = [];
  lastActiveIndex = -1;

  const lyrics = await fetchSyncedLyrics(track, artist);
  if (!lyrics || lyrics.length === 0) {
    stage.innerHTML = `<div class="line current">싱크 가사를 찾지 못했어요</div>
                        <div class="line" style="font-size:14px;margin-top:8px;">추정: ${escapeHtml(artist)} - ${escapeHtml(track)}</div>`;
    return;
  }
  currentLyrics = lyrics;
  renderLyricLines(-1);
}

async function fetchSyncedLyrics(trackName, artistName) {
  const params = new URLSearchParams({ track_name: trackName, artist_name: artistName });
  const res = await fetch(`https://lrclib.net/api/search?${params}`);
  if (!res.ok) return null;
  const results = await res.json();
  const best = results.find(r => r.syncedLyrics) || results[0];
  if (!best || !best.syncedLyrics) return null;
  return parseLRC(best.syncedLyrics);
}

function parseLRC(lrcText) {
  const lines = lrcText.split('\n');
  const result = [];
  const timeTag = /\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/;
  for (const line of lines) {
    const match = line.match(timeTag);
    if (!match) continue;
    const min = parseInt(match[1], 10);
    const sec = parseInt(match[2], 10);
    const ms = match[3] ? parseInt(match[3].padEnd(3, '0'), 10) : 0;
    const time = min * 60 + sec + ms / 1000;
    const text = line.replace(timeTag, '').trim();
    result.push({ time, text: text || '♪' });
  }
  return result.sort((a, b) => a.time - b.time);
}

/* =========================================================
   4. 재생 위치 폴링 → 줄 하이라이트
   ========================================================= */
setInterval(() => {
  if (!ytPlayer || !ytReady || currentLyrics.length === 0) return;
  if (typeof ytPlayer.getCurrentTime !== 'function') return;
  const pos = ytPlayer.getCurrentTime();
  updateLyricPosition(pos);
}, 200);

function renderLyricLines(activeIndex) {
  const stage = document.getElementById('lyricsTrack');
  stage.innerHTML = currentLyrics.map((l, i) => {
    const cls = i === activeIndex ? 'current'
              : Math.abs(i - activeIndex) === 1 ? 'near'
              : '';
    return `<div class="line ${cls}" data-i="${i}">${escapeHtml(l.text)}</div>`;
  }).join('');
}

function updateLyricPosition(posSec) {
  let idx = -1;
  for (let i = 0; i < currentLyrics.length; i++) {
    if (currentLyrics[i].time <= posSec) idx = i;
    else break;
  }
  if (idx !== lastActiveIndex) {
    lastActiveIndex = idx;
    renderLyricLines(idx);
    const track = document.getElementById('lyricsTrack');
    const activeEl = track.querySelector(`[data-i="${idx}"]`);
    if (activeEl) {
      const offset = activeEl.offsetTop - track.parentElement.clientHeight / 2 + activeEl.clientHeight / 2;
      track.style.transform = `translateY(${-offset}px)`;
    }
  }
  const cur = currentLyrics[idx];
  const next = currentLyrics[idx + 1];
  if (cur && next) {
    const ratio = Math.min(1, Math.max(0, (posSec - cur.time) / (next.time - cur.time)));
    document.getElementById('progressBar').style.width = `${ratio * 100}%`;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
