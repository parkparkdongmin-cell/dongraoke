<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Tesla Lyrics Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #15181d;
    --text-primary: #f5f6f7;
    --text-muted: #6b7480;
    --text-dim: #3a4048;
    --accent: #00d4ff;
    --accent-glow: rgba(0, 212, 255, 0.35);
    --danger: #ff5252;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Top bar: 트랙 정보 ---------- */
  #topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 28px;
    border-bottom: 1px solid #1e2228;
    flex-shrink: 0;
  }
  #albumArt {
    width: 44px; height: 44px; border-radius: 6px;
    background: var(--surface);
    object-fit: cover;
    flex-shrink: 0;
  }
  #trackMeta { min-width: 0; flex: 1; }
  #trackTitle {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #trackArtist {
    font-size: 12px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #status {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 5px 10px;
    border: 1px solid #262b32;
    border-radius: 100px;
    flex-shrink: 0;
  }
  #status.live { color: var(--accent); border-color: var(--accent); }

  /* ---------- 가사 스테이지 ---------- */
  :root {
    /* 테슬라 화면에서 상단이 잘리면 이 값을 늘려서 가사 전체를 아래로 내리세요.
       예: 18vh = 화면 높이의 18%만큼 아래로 이동. 30%를 원하면 30vh로 변경 */
    --lyrics-top-offset: 18vh;
  }
  #lyricsStage {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding-top: var(--lyrics-top-offset);
  }
  #lyricsTrack {
    width: 100%;
    max-width: 900px;
    padding: 0 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }
  .line {
    font-family: 'Space Grotesk', sans-serif;
    font-size: calc(22px * var(--lyric-scale, 1));
    font-weight: 500;
    line-height: 1.5;
    color: var(--text-dim);
    transition: color 0.4s ease, font-size 0.4s ease, text-shadow 0.4s ease;
    min-height: 1.5em;
  }
  .line.current {
    color: var(--text-primary);
    font-size: calc(34px * var(--lyric-scale, 1));
    font-weight: 700;
    text-shadow: 0 0 24px var(--accent-glow);
  }
  .line.near {
    color: var(--text-muted);
    font-size: calc(24px * var(--lyric-scale, 1));
  }

  #progressBar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: var(--accent);
    width: 0%;
    box-shadow: 0 0 10px var(--accent-glow);
    transition: width 0.1s linear;
  }

  #controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 14px;
    border-top: 1px solid #1e2228;
    flex-shrink: 0;
  }
  #controls button {
    background: none;
    border: 1px solid #262b32;
    color: var(--text-primary);
    width: 48px; height: 48px;
    border-radius: 100px;
    font-size: 15px;
    cursor: pointer;
  }
  #controls button:active { background: var(--surface); }
  #playPauseBtn { width: 56px; height: 56px; font-size: 18px; }
  #fontDownBtn, #fontUpBtn { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }

  /* ---------- 히스토리 패널 ---------- */
  #historyBtn {
    background: none;
    border: 1px solid #262b32;
    color: var(--text-muted);
    width: 34px; height: 34px;
    border-radius: 100px;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #historyPanel {
    position: absolute;
    top: 0; right: 0;
    width: 280px;
    height: 100%;
    background: rgba(10, 12, 15, 0.96);
    border-left: 1px solid #1e2228;
    backdrop-filter: blur(6px);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 30;
    overflow-y: auto;
    padding: 16px;
  }
  #historyPanel.open { transform: translateX(0); }
  #historyPanel h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 12px;
  }
  .historyItem {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
  }
  .historyItem:hover { background: var(--surface); }
  .historyItem img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
  .historyItem .hTitle { font-size: 13px; font-weight: 500; }
  .historyItem .hArtist { font-size: 11px; color: var(--text-muted); }

  /* ---------- 가사 없을 때 앨범아트 폴백 ---------- */
  #albumFallback {
    display: none;
    width: min(60vh, 70vw);
    height: min(60vh, 70vw);
    border-radius: 16px;
    object-fit: cover;
    box-shadow: 0 0 60px var(--accent-glow);
  }

  #emptyState {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text-muted);
    font-size: 15px;
    text-align: center;
    line-height: 1.8;
  }
  #emptyState button {
    margin-top: 16px;
    background: var(--accent);
    color: #05141a;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 100px;
    font-size: 13px;
    letter-spacing: 0.03em;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <img id="albumArt" src="" alt="" />
    <div id="trackMeta">
      <div id="trackTitle">연결 대기 중</div>
      <div id="trackArtist">—</div>
    </div>
    <button id="historyBtn" title="최근 재생">☰</button>
    <div id="status">OFFLINE</div>
  </div>

  <div id="lyricsStage">
    <div id="emptyState">
      <div>스포티파이 계정을 연결하면<br/>재생 중인 곡의 가사가 여기 표시됩니다.</div>
      <button id="connectBtn">스포티파이 연결</button>
    </div>
    <div id="lyricsTrack" style="display:none;"></div>
    <img id="albumFallback" src="" alt="" />
    <div id="progressBar"></div>
    <div id="historyPanel">
      <h3>최근 재생</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <div id="controls">
    <button id="fontDownBtn" title="가사 작게">A-</button>
    <button id="prevTrackBtn" title="이전 곡">◀◀</button>
    <button id="playPauseBtn" title="재생/일시정지">▶</button>
    <button id="nextTrackBtn" title="다음 곡">▶▶</button>
    <button id="fontUpBtn" title="가사 크게">A+</button>
  </div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
/* =========================================================
   설정 — 본인 값으로 교체하세요
   ========================================================= */
const CLIENT_ID = '17f73544fbec440d88726575c4a1fc49';
const REDIRECT_URI = window.location.origin + window.location.pathname; // Spotify Dashboard에 동일하게 등록 필요
const SCOPES = 'streaming user-read-email user-read-private user-read-playback-state user-modify-playback-state';

/* =========================================================
   1. PKCE 인증 플로우
   ========================================================= */
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function pkceChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return base64url(digest);
}

function randomVerifier(len = 64) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return base64url(arr).slice(0, len);
}

async function startLogin() {
  const verifier = randomVerifier();
  sessionStorage.setItem('pkce_verifier', verifier);
  const challenge = await pkceChallenge(verifier);

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: challenge,
    scope: SCOPES
  });
  window.location.href = `https://accounts.spotify.com/authorize?${params}`;
}

async function exchangeCodeForToken(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });
  if (!res.ok) throw new Error('토큰 교환 실패');
  const data = await res.json();
  localStorage.setItem('sp_access_token', data.access_token);
  localStorage.setItem('sp_refresh_token', data.refresh_token);
  localStorage.setItem('sp_expires_at', Date.now() + data.expires_in * 1000);
  return data.access_token;
}

async function getValidToken() {
  const expiresAt = Number(localStorage.getItem('sp_expires_at') || 0);
  if (Date.now() < expiresAt - 5000) {
    return localStorage.getItem('sp_access_token');
  }
  const refreshToken = localStorage.getItem('sp_refresh_token');
  if (!refreshToken) return null;
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'refresh_token',
    refresh_token: refreshToken
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });
  if (!res.ok) return null;
  const data = await res.json();
  localStorage.setItem('sp_access_token', data.access_token);
  localStorage.setItem('sp_expires_at', Date.now() + data.expires_in * 1000);
  return data.access_token;
}

/* =========================================================
   2. Spotify Web Playback SDK 초기화
   ========================================================= */
let player, currentDeviceId;
let currentLyrics = [];   // [{time: seconds, text: string}]
let currentTrackKey = ''; // 중복 요청 방지용

window.onSpotifyWebPlaybackSDKReady = async () => {
  const token = await getValidToken();
  if (!token) return; // 아직 로그인 안 함

  player = new Spotify.Player({
    name: 'Tesla Lyrics Sync',
    getOAuthToken: async cb => cb(await getValidToken()),
    volume: 1.0
  });

  player.addListener('ready', ({ device_id }) => {
    currentDeviceId = device_id;
    setStatus(true);
    requestWakeLock();
    // 참고: 여기서 자동으로 재생을 가져오지 않음.
    // 폰의 스포티파이 앱에서 "기기" 목록 → "Tesla Lyrics Sync" 선택하면
    // 이 브라우저 탭으로 재생이 넘어옵니다 (Spotify Connect).
  });

  player.addListener('not_ready', () => setStatus(false));

  player.addListener('player_state_changed', state => {
    if (!state) return;
    const track = state.track_window.current_track;
    updateTrackMeta(track);
    maybeLoadLyrics(track);
    document.getElementById('playPauseBtn').textContent = state.paused ? '▶' : '❚❚';
  });

  player.connect();

  document.getElementById('playPauseBtn').addEventListener('click', () => player?.togglePlay());
  document.getElementById('nextTrackBtn').addEventListener('click', () => player?.nextTrack());
  document.getElementById('prevTrackBtn').addEventListener('click', () => player?.previousTrack());

  // 재생 위치를 자체 폴링 (SDK는 초 단위 이벤트만 주므로 부드러운 스크롤용으로 별도 루프 사용)
  setInterval(async () => {
    if (!player) return;
    const state = await player.getCurrentState();
    if (state) updateLyricPosition(state.position / 1000);
  }, 250);
};

/* =========================================================
   3. UI 업데이트
   ========================================================= */
function setStatus(live) {
  const el = document.getElementById('status');
  el.textContent = live ? 'LIVE' : 'OFFLINE';
  el.classList.toggle('live', live);
}

let playHistory = []; // [{uri, name, artist, art}]

function updateTrackMeta(track) {
  document.getElementById('trackTitle').textContent = track.name;
  document.getElementById('trackArtist').textContent = track.artists.map(a => a.name).join(', ');
  const art = track.album?.images?.[0]?.url;
  if (art) {
    document.getElementById('albumArt').src = art;
    document.getElementById('albumFallback').src = art;
    extractThemeColor(art);
  }
  addToHistory(track, art);
}

function addToHistory(track, art) {
  if (playHistory.length && playHistory[0].uri === track.uri) return; // 같은 곡 중복 방지
  playHistory.unshift({
    uri: track.uri,
    name: track.name,
    artist: track.artists.map(a => a.name).join(', '),
    art
  });
  playHistory = playHistory.slice(0, 20); // 최근 20곡까지만
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = playHistory.map(h => `
    <div class="historyItem" data-uri="${h.uri}">
      <img src="${h.art || ''}" />
      <div>
        <div class="hTitle">${escapeHtml(h.name)}</div>
        <div class="hArtist">${escapeHtml(h.artist)}</div>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.historyItem').forEach(el => {
    el.addEventListener('click', () => playTrackByUri(el.dataset.uri));
  });
}

async function playTrackByUri(uri) {
  const token = await getValidToken();
  if (!token || !currentDeviceId) return;
  await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${currentDeviceId}`, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ uris: [uri] })
  });
  document.getElementById('historyPanel').classList.remove('open');
}

document.getElementById('historyBtn').addEventListener('click', () => {
  document.getElementById('historyPanel').classList.toggle('open');
});

/* ---------- 앨범 아트에서 대표 색상 추출 → 테마 색으로 반영 ---------- */
function extractThemeColor(imgUrl) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const canvas = document.createElement('canvas');
      canvas.width = 16; canvas.height = 16;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 16, 16);
      const data = ctx.getImageData(0, 0, 16, 16).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < data.length; i += 4) {
        r += data[i]; g += data[i + 1]; b += data[i + 2];
        count++;
      }
      r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
      // 너무 어둡거나 채도가 낮으면 보정
      const max = Math.max(r, g, b);
      if (max < 120) { r = Math.min(255, r * 1.6); g = Math.min(255, g * 1.6); b = Math.min(255, b * 1.6); }
      document.documentElement.style.setProperty('--accent', `rgb(${r}, ${g}, ${b})`);
      document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.35)`);
    } catch (e) {
      // CORS 등으로 픽셀 추출 실패 시 기본 색 유지
      console.warn('테마 색 추출 실패:', e);
    }
  };
  img.src = imgUrl;
}

/* ---------- 가사 폰트 크기 조절 ---------- */
let lyricScale = parseFloat(localStorage.getItem('lyric_scale') || '1');
document.documentElement.style.setProperty('--lyric-scale', lyricScale);

function setLyricScale(v) {
  lyricScale = Math.min(1.6, Math.max(0.6, v));
  document.documentElement.style.setProperty('--lyric-scale', lyricScale);
  localStorage.setItem('lyric_scale', lyricScale);
}
document.getElementById('fontUpBtn').addEventListener('click', () => setLyricScale(lyricScale + 0.1));
document.getElementById('fontDownBtn').addEventListener('click', () => setLyricScale(lyricScale - 0.1));

/* ---------- 화면 꺼짐 방지 (Wake Lock) ---------- */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) {
    console.warn('Wake Lock 실패:', e);
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

/* =========================================================
   4. lrclib.net 에서 싱크 가사 가져오기
   ========================================================= */
async function fetchSyncedLyrics(trackName, artistName, durationSec) {
  const params = new URLSearchParams({
    track_name: trackName,
    artist_name: artistName,
    duration: Math.round(durationSec)
  });
  const res = await fetch(`https://lrclib.net/api/get?${params}`);
  if (!res.ok) return null;
  const data = await res.json();
  if (!data.syncedLyrics) return null;
  return parseLRC(data.syncedLyrics);
}

// LRC 포맷([mm:ss.xx]가사) 파싱
function parseLRC(lrcText) {
  const lines = lrcText.split('\n');
  const result = [];
  const timeTag = /\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/;
  for (const line of lines) {
    const match = line.match(timeTag);
    if (!match) continue;
    const min = parseInt(match[1], 10);
    const sec = parseInt(match[2], 10);
    const ms = match[3] ? parseInt(match[3].padEnd(3, '0'), 10) : 0;
    const time = min * 60 + sec + ms / 1000;
    const text = line.replace(timeTag, '').trim();
    result.push({ time, text: text || '♪' });
  }
  return result.sort((a, b) => a.time - b.time);
}

async function maybeLoadLyrics(track) {
  const key = `${track.name}__${track.artists[0]?.name}`;
  if (key === currentTrackKey) return;
  currentTrackKey = key;

  document.getElementById('emptyState').style.display = 'none';
  const stage = document.getElementById('lyricsTrack');
  const fallback = document.getElementById('albumFallback');
  fallback.style.display = 'none';
  stage.style.display = 'block';
  stage.innerHTML = `<div class="line current">가사 불러오는 중…</div>`;

  const durationSec = track.duration_ms / 1000;
  const lyrics = await fetchSyncedLyrics(track.name, track.artists[0]?.name || '', durationSec);

  if (!lyrics || lyrics.length === 0) {
    stage.style.display = 'none';
    fallback.style.display = 'block';
    currentLyrics = [];
    return;
  }
  currentLyrics = lyrics;
  renderLyricLines(-1);
}

function renderLyricLines(activeIndex) {
  const stage = document.getElementById('lyricsTrack');
  const prev = currentLyrics[activeIndex - 1];
  const cur = currentLyrics[activeIndex];
  const next = currentLyrics[activeIndex + 1];

  stage.innerHTML = `
    <div class="line near">${prev ? escapeHtml(prev.text) : '&nbsp;'}</div>
    <div class="line current">${cur ? escapeHtml(cur.text) : '&nbsp;'}</div>
    <div class="line near">${next ? escapeHtml(next.text) : '&nbsp;'}</div>
  `;
}

let lastActiveIndex = -1;
function updateLyricPosition(posSec) {
  if (currentLyrics.length === 0) return;
  let idx = -1;
  for (let i = 0; i < currentLyrics.length; i++) {
    if (currentLyrics[i].time <= posSec) idx = i;
    else break;
  }
  if (idx !== lastActiveIndex) {
    lastActiveIndex = idx;
    renderLyricLines(idx);
  }

  // 다음 줄까지의 진행률 (프로그레스 바)
  const next = currentLyrics[idx + 1];
  const cur = currentLyrics[idx];
  if (cur && next) {
    const ratio = Math.min(1, Math.max(0, (posSec - cur.time) / (next.time - cur.time)));
    document.getElementById('progressBar').style.width = `${ratio * 100}%`;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* =========================================================
   5. 로그인 버튼 / 콜백 처리
   ========================================================= */
document.getElementById('connectBtn').addEventListener('click', startLogin);

(async function initAuthCallback() {
  const url = new URL(window.location.href);
  const code = url.searchParams.get('code');
  if (code) {
    try {
      await exchangeCodeForToken(code);
      window.history.replaceState({}, '', REDIRECT_URI); // ?code= 제거
    } catch (e) {
      console.error(e);
    }
  }
  const token = await getValidToken();
  if (token) {
    document.getElementById('emptyState').innerHTML =
